name: Reusable TF Apply
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environment name (sandbox, staging, prod)"
      tf_working_dir:
        required: true
        type: string
        description: "Terraform working directory"

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: ./.github/actions/aws-auth-oidc
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform plan -out=tfplan -no-color

      - name: Export Plan to JSON
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform show -json tfplan > plan.json

      - name: Setup Conftest
        run: |
          wget -qO- https://github.com/open-policy-agent/conftest/releases/download/v0.45.0/conftest_0.45.0_Linux_x86_64.tar.gz | tar xz conftest
          sudo mv conftest /usr/local/bin/
      - name: OPA Contract Testing
        working-directory: ${{ inputs.tf_working_dir }}
        run: conftest test plan.json -p ../../../contracts/opa/prerequisites.rego

      - name: Terraform Apply
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform apply -auto-approve tfplan
