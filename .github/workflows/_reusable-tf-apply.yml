name: Reusable TF Apply
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environment name (sandbox, staging, prod)"
      tf_working_dir:
        required: true
        type: string
        description: "Terraform working directory"

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: ./.github/actions/aws-auth-oidc
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform plan -out=tfplan -input=false -no-color

      - name: Export Plan to JSON
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform show -json tfplan > plan.json

      - name: Terraform Apply
        working-directory: ${{ inputs.tf_working_dir }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Push Variables to GitHub Environment
        working-directory: ${{ inputs.tf_working_dir }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ GH_PAT secret is missing. Skipping GitHub variables sync."
            exit 0
          fi
          echo "Syncing Terraform outputs to GitHub Environment: $ENV_NAME..."
          
          AWS_ACCOUNT_ID=$(terraform output -raw aws_account_id 2>/dev/null || echo "")
          ECR_REGISTRY=$(terraform output -raw ecr_registry_url 2>/dev/null || echo "")
          ECR_REPO_PREFIX=$(terraform output -raw ecr_repo_prefix 2>/dev/null || echo "")
          
          if [ -n "$AWS_ACCOUNT_ID" ]; then gh variable set AWS_ACCOUNT_ID --body "$AWS_ACCOUNT_ID" --env "$ENV_NAME"; fi
          if [ -n "$ECR_REGISTRY" ]; then gh variable set ECR_REGISTRY --body "$ECR_REGISTRY" --env "$ENV_NAME"; fi
          if [ -n "$ECR_REPO_PREFIX" ]; then gh variable set ECR_REPO_PREFIX --body "$ECR_REPO_PREFIX" --env "$ENV_NAME"; fi
          echo "✅ Variables synced successfully."
