name: Infra - Apply
on:
  push:
    branches:
      - "main"
      - "develop"
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    # Optional: Add environment protection rules here
    # environment: production
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: ./.github/actions/aws-auth-oidc
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/environments/sandbox
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/environments/sandbox
        run: terraform apply -auto-approve
