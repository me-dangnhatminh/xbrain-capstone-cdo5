name: Promote Image to Production
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application Name to Promote"
        required: true
        type: choice
        options:
          - platform-service
          - ai-engine
          - simulator
      staging_tag:
        description: "Existing tag from Staging to promote (e.g. staging-abc1234)"
        required: true
        type: string
      release_tag:
        description: "New Release Tag for Prod (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  promote-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine ECR Repositories
        id: set-repo
        run: |
          PREFIX="${{ vars.ECR_REPO_PREFIX }}"
          echo "staging_repo=${PREFIX}-staging-tf1-${{ inputs.app_name }}" >> $GITHUB_OUTPUT
          echo "prod_repo=${PREFIX}-prod-tf1-${{ inputs.app_name }}" >> $GITHUB_OUTPUT

      - name: AWS Auth
        uses: ./.github/actions/aws-auth-oidc
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}

      - name: Setup Crane
        uses: imjasonh/setup-crane@v0.3

      - name: Login to ECR for Crane
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} | crane auth login ${{ vars.ECR_REGISTRY }} -u AWS --password-stdin

      - name: Copy & Retag Image (Promotion)
        run: |
          SRC="${{ vars.ECR_REGISTRY }}/${{ steps.set-repo.outputs.staging_repo }}:${{ inputs.staging_tag }}"
          DEST="${{ vars.ECR_REGISTRY }}/${{ steps.set-repo.outputs.prod_repo }}:${{ inputs.release_tag }}"
          echo "Promoting image..."
          echo "From: $SRC"
          echo "To:   $DEST"
          crane copy $SRC $DEST

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.2.4"

      - name: Sign Production Image
        run: |
          DEST="${{ vars.ECR_REGISTRY }}/${{ steps.set-repo.outputs.prod_repo }}:${{ inputs.release_tag }}"
          cosign sign --yes $DEST

  _reusable-update:
    needs: promote-image
    uses: ./.github/workflows/_reusable-update-argocd.yml
    with:
      app-name: ${{ inputs.app_name }}
      image-tag: "${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPO_PREFIX }}-prod-tf1-${{ inputs.app_name }}:${{ inputs.release_tag }}"
      overlay-path: manifests/overlays/prod
