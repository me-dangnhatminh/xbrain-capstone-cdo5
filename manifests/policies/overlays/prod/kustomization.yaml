apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Production: Kế thừa 100% từ base (enforcementAction: deny).
# Nếu cần thêm ràng buộc khắt khe hơn chỉ riêng cho Prod, thêm file vào đây.
# Ví dụ:
# - strict-replicas.yaml  (bắt buộc minReplicas >= 2)
# - block-latest-tag.yaml (cấm dùng image:latest)
